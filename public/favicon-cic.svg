<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fondo azul para mejor visibilidad -->
  <rect width="32" height="32" fill="#1e40af" rx="4"/>
  
  <!-- Logo simplificado de Car Injury Clinic -->
  <g transform="translate(4, 6)">
    <!-- Texto "CIC" estilizado -->
    <text x="12" y="12" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">CIC</text>
    
    <!-- Cruz médica -->
    <g transform="translate(12, 16)">
      <rect x="-1" y="-4" width="2" height="8" fill="white"/>
      <rect x="-4" y="-1" width="8" height="2" fill="white"/>
    </g>
  </g>
</svg>