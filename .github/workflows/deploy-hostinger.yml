name: deploy-hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_WEBHOOK_URL: https://hook.us1.make.com/j3f0pfymobfhtpsldmlw6hn3plmb9p5k

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 31.170.166.253
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: dist
          server-dir: domains/carinjuryclinics.com/public_html
          protocol: ftps
          log-level: verbose
